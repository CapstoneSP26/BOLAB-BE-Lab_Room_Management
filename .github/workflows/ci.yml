name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore BookLAB.sln

      - name: Build solution
        run: dotnet build BookLAB.sln --configuration Release --no-restore

      - name: Run tests (if any test projects exist)
        shell: bash
        run: |
          if find . -name "*.Tests.csproj" -o -name "*Test*.csproj" | grep -q .; then
            dotnet test BookLAB.sln --configuration Release --no-build
          else
            echo "No test project found. Skipping tests."
          fi
