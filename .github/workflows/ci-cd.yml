name: CI

on:
  pull_request:
    branches:
      - main
      - Develop
  push:
    branches:
      - main
      - Develop

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln

      - name: Restore dependencies
        run: dotnet restore BookLAB.sln

      - name: Build solution
        run: dotnet build BookLAB.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test BookLAB.sln --configuration Release --no-build --verbosity normal
